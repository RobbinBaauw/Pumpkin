output_path = "experiments"
metrics_path = "experiments"
experiments_folder = "experiments"
wrapper = "gourd_wrapper"
warn_on_label_overlap = false

[slurm]
experiment_name = "intsat_bench_1"
partition = "compute"
account = "Education-EEMCS-MSc-CS"
output_folder = "./"

[resource_limits]
time_limit = "1h 1m"
cpus = 1
mem_per_cpu = 16384

[program]
[program.resolution]
binary = "./intsat_benchmarks"
arguments = ["--time-limit", "3600000"]

[program.intsat-nolearn]
binary = "./intsat_benchmarks"
arguments = ["--use-intsat", "--skip-nogood-learning", "--time-limit", "3600000"]

[program.intsat-learn]
binary = "./intsat_benchmarks"
arguments = ["--use-intsat", "--time-limit", "3600000"]

[input]

[input.benchmarks]
arguments = ["path|./benchmarks-set/**/*.fzn"]

[input.examples]
arguments = ["path|./examples-set/**/*.fzn"]
